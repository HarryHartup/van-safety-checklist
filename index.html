<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vehicle Inspection</title>
<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>

<div class="container">

<h1>Vehicle Inspection</h1>

<div class="inspection-type">
<h3>Inspection Type</h3>
<div class="toggle">
<button id="preBtn" class="toggle-btn active" onclick="setInspection('Pre')">Pre</button>
<button id="postBtn" class="toggle-btn" onclick="setInspection('Post')">Post</button>
</div>
<input type="hidden" id="inspectionType" value="Pre">
</div>

<div class="vehicle-info">

<label>Vehicle Registration</label>
<input type="text" id="reg">

<a class="gov-link" target="_blank"
href="https://vehicleenquiry.service.gov.uk/">
Check MOT & Tax
</a>

<label>Mileage</label>
<input type="number" id="mileage">

</div>

<div class="safe-drive">
<h3>Safe To Drive?</h3>

<div class="toggle">
<button id="safeBtn" class="toggle-btn active" onclick="setSafe(true)">YES</button>
<button id="unsafeBtn" class="toggle-btn" onclick="setSafe(false)">NO</button>
</div>

<input type="hidden" id="safeToDrive" value="Yes">
</div>

<div id="checklist"></div>

<h3>Notes</h3>
<textarea id="notes"></textarea>

<h3>Upload Photos</h3>
<input type="file" id="photoUpload" multiple accept="image/*">

<button class="export" onclick="exportPDF()">Export PDF</button>

</div>

<script src="app.js"></script>

</body>
</html>
